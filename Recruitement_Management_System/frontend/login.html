<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RMS</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        body {
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.15) 0px, transparent 50%);
        }

        .login-card {
            background: var(--surface);
            backdrop-filter: var(--blur);
            padding: 3rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-xl);
            width: 100%;
            max-width: 420px;
            text-align: center;
            border: 1px solid var(--border);
            animation: modalSlideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .login-header {
            margin-bottom: 2.5rem;
        }

        .login-header h2 {
            color: var(--text-main);
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: var(--text-secondary);
            font-weight: 500;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        .btn-block {
            width: 100%;
            justify-content: center;
            margin-top: 1rem;
            padding: 1rem;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="login-header">
            <h2>RMS</h2>
            <p>Recruitment Management System</p>
        </div>
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" required value="admin@rms.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required value="admin123">
            </div>
            <button type="submit" class="btn btn-primary btn-block">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>
    </div>

    <script>
        // Check for File Protocol
        if (window.location.protocol === 'file:') {
            alert('CRITICAL ERROR: You are opening this file directly.\nPlease verify you are running the backend.');
        }
    </script>

    <script>
        const API_BASE = 'http://localhost:5000/';

        function handleLogin(event) {
            event.preventDefault();
            // Bypass backend check and immediately enter the website
            const user = { id: 1, name: "Admin User", email: "admin@rms.com" };
            localStorage.setItem('user', JSON.stringify(user));
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
